<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MSA at UW — Fluid Reveal Hero</title>
<style>
  /* ============================================================
     COLOR / SPEED CONTROLS — everything you'd want to tweak lives
     in this :root block and the ANIM_* constants in the <script>
     below. Nothing else in the file needs to change for a re-theme.
     ============================================================ */
  :root {
    --bg: #0D0D10;
    --pink: #E8A9D6;      /* skyline gradient start */
    --purple: #6B3FA0;    /* skyline gradient end / wordmark solid purple / ripple ring 1 */
    --purple-deep: #4B2E83;
    --gold: #C9A44C;      /* ripple ring 2 */
    --moon: #F4F1F8;
    --grid-dot: #222226;
  }

  * { box-sizing: border-box; }
  html, body { margin: 0; height: 100%; background: var(--bg); overflow-x: hidden; }
  body {
    font-family: 'Poppins', system-ui, -apple-system, sans-serif;
    display: grid; place-items: center; min-height: 100vh; position: relative;
  }

  /* ---- Step 3: interactive background grid --------------------- */
  #grid-canvas { position: fixed; inset: 0; z-index: 0; display: block; }

  /* ---- Hero wrapper --------------------------------------------- */
  .hero {
    position: relative; z-index: 2; text-align: center;
    max-width: 720px; padding: 60px 24px; display: flex;
    flex-direction: column; align-items: center;
  }

  /* ---- Step 1: wireframe accent shapes --------------------------- */
  .accent { position: absolute; top: 8%; width: 140px; height: 260px;
    opacity: 0; pointer-events: none; z-index: 1; }
  .accent-left { left: -60px; }
  .accent-right { right: -60px; transform: scaleX(-1); }

  /* ---- Step 2: logo stage ---------------------------------------- */
  .logo-stage { position: relative; width: 260px; height: 260px; margin-bottom: 20px; }
  .crescent-draw { position: absolute; inset: 0; }
  /* Tilted, horns-up orientation — like the crescent on the Pakistani flag.
     Change --moon-tilt to adjust the lean. */
  .crescent-draw, .moon-fill-svg { transform: rotate(var(--moon-tilt, -25deg)); transform-origin: 50% 50%; }
  .crescent-draw path {
    fill: none; stroke: var(--moon); stroke-width: 3;
    stroke-linecap: round; filter: drop-shadow(0 0 10px rgba(244,241,248,.35));
  }
  .moon-fill-svg { position: absolute; inset: 0; opacity: 0; }
  .skyline-rise {
    position: absolute; inset: 0; opacity: 0;
  }
  .window { animation: flicker 2.6s ease-in-out infinite; animation-delay: var(--wd, 0s); }
  @keyframes flicker {
    0%, 100% { opacity: .35; }
    45% { opacity: 1; }
    52% { opacity: .5; }
    60% { opacity: .95; }
  }
  .logo-img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: contain; opacity: 0; transform: scale(0.85);
    filter: drop-shadow(0 0 22px rgba(107,63,160,.35));
  }

  /* ---- Wordmark (separate from the raster logo, for letter stagger) */
  .wordmark { display: flex; align-items: baseline; gap: 10px; justify-content: center;
    flex-wrap: wrap; margin-bottom: 10px; }
  .wordmark .letter { display: inline-block; opacity: 0; }
  .word-msa .letter {
    font-size: 42px; font-weight: 800; letter-spacing: 1px;
    background: linear-gradient(120deg, var(--pink), var(--purple));
    -webkit-background-clip: text; background-clip: text; color: transparent;
  }
  .word-atuw .letter {
    font-size: 22px; font-weight: 700; letter-spacing: 3px; color: var(--purple);
    align-self: center;
  }

  /* ---- Step 4: headline / subtitle / CTAs ------------------------- */
  .headline { margin: 6px 0 14px; color: #F5F3F8; font-weight: 800;
    font-size: clamp(28px, 5vw, 46px); line-height: 1.15; letter-spacing: -0.5px; }
  .headline .word { display: inline-block; opacity: 0; margin: 0 6px; }

  .subtitle { margin: 0 0 34px; color: rgba(245,243,248,.72); font-size: 16px;
    max-width: 480px; opacity: 0; }

  .cta-row { display: flex; gap: 16px; flex-wrap: wrap; justify-content: center; }
  .btn { padding: 14px 28px; border-radius: 12px; font-weight: 700; font-size: 15px;
    text-decoration: none; cursor: pointer; opacity: 0; transform: translateY(24px); }
  .btn-primary { background: linear-gradient(120deg, var(--purple), var(--pink)); color: #fff; border: none; }
  .btn-secondary {
    color: #F5F3F8; background: transparent; position: relative;
    border: 1px solid transparent; background-clip: padding-box;
  }
  .btn-secondary { border: 1px solid rgba(232,169,214,.5); }
  .btn-secondary:hover { border-color: var(--pink); }
</style>
</head>
<body>

  <canvas id="grid-canvas" aria-hidden="true"></canvas>

  <div class="hero">

    <!-- Step 1: wireframe accents (pink -> purple gradient stroke) -->
    <svg class="accent accent-left" viewBox="0 0 140 260" aria-hidden="true">
      <defs>
        <linearGradient id="accentGrad" x1="0" y1="0" x2="0" y2="1">
          <stop offset="0%" stop-color="var(--pink)" />
          <stop offset="100%" stop-color="var(--purple)" />
        </linearGradient>
      </defs>
      <polyline points="10,240 70,20 130,240" fill="none" stroke="url(#accentGrad)" stroke-width="1.4" opacity="0.55"/>
      <polyline points="30,240 70,90 110,240" fill="none" stroke="url(#accentGrad)" stroke-width="1" opacity="0.35"/>
    </svg>
    <svg class="accent accent-right" viewBox="0 0 140 260" aria-hidden="true">
      <polyline points="10,240 70,20 130,240" fill="none" stroke="url(#accentGrad)" stroke-width="1.4" opacity="0.55"/>
      <polyline points="30,240 70,90 110,240" fill="none" stroke="url(#accentGrad)" stroke-width="1" opacity="0.35"/>
    </svg>

    <!-- Step 2: logo stage -->
    <div class="logo-stage">
      <!-- Shared crescent shape, reused for: the self-drawing outline,
           a faint filled moon body, and the clip-path that keeps the
           skyline confined to the inside of the moon. -->
      <svg width="0" height="0" style="position:absolute" aria-hidden="true">
        <defs>
          <!-- NOTE: if you change --moon-tilt above, update the -25 here to
               match — SVG clipPath transforms can't read CSS variables. -->
          <clipPath id="moonClip" clipPathUnits="userSpaceOnUse">
            <path transform="rotate(-25 130 130)"
              d="M 130 20 A 100 100 0 1 0 130 240 A 88 100 0 1 1 130 20 Z" />
          </clipPath>
        </defs>
      </svg>

      <!-- Faint filled moon body, so the buildings read as "inside" the
           moon rather than floating on dark background. -->
      <svg class="moon-fill-svg" viewBox="0 0 260 260" aria-hidden="true">
        <path fill="var(--moon)" opacity="0.08"
          d="M 130 20 A 100 100 0 1 0 130 240 A 88 100 0 1 1 130 20 Z" />
      </svg>

      <!-- 2A: crescent moon self-draws via stroke-dashoffset, tilted like
           the crescent on the Pakistani flag (see --moon-tilt above). -->
      <svg class="crescent-draw" viewBox="0 0 260 260" aria-hidden="true">
        <path id="crescentPath"
          d="M 130 20 A 100 100 0 1 0 130 240 A 88 100 0 1 1 130 20 Z" />
      </svg>

      <!-- 2B: skyline, clipped so it only shows inside the crescent's
           lower half — buildings + a flickering neon window per building. -->
      <svg class="skyline-rise" viewBox="0 0 260 260" clip-path="url(#moonClip)" aria-hidden="true">
        <defs>
          <linearGradient id="skylineGrad" x1="0" y1="0" x2="0" y2="1">
            <stop offset="0%" stop-color="var(--pink)" />
            <stop offset="100%" stop-color="var(--purple)" />
          </linearGradient>
        </defs>
        <g fill="url(#skylineGrad)">
          <rect x="34"  y="168" width="14" height="46"/>
          <rect x="50"  y="150" width="12" height="64"/>
          <rect x="66"  y="176" width="14" height="38"/>
          <!-- Space Needle -->
          <rect x="90"  y="120" width="4"  height="34"/>
          <ellipse cx="92" cy="156" rx="13" ry="6"/>
          <polygon points="84,162 100,162 92,214"/>
          <rect x="58"  y="164" width="14" height="50"/>
          <rect x="108" y="170" width="15" height="44"/>
          <rect x="126" y="148" width="13" height="66"/>
        </g>
        <!-- neon window lights — small glowing dots, each flickers on its
             own cycle via the .window CSS animation above -->
        <g>
          <circle class="window" cx="39" cy="180" r="1.4" fill="#FFE9A8" style="--wd:.1s"/>
          <circle class="window" cx="39" cy="192" r="1.4" fill="#8FE3FF" style="--wd:.6s"/>
          <circle class="window" cx="55" cy="162" r="1.4" fill="#FFE9A8" style="--wd:.3s"/>
          <circle class="window" cx="55" cy="178" r="1.4" fill="#FF9AD5" style="--wd:1.1s"/>
          <circle class="window" cx="55" cy="196" r="1.4" fill="#8FE3FF" style="--wd:.8s"/>
          <circle class="window" cx="71" cy="188" r="1.4" fill="#FFE9A8" style="--wd:1.4s"/>
          <circle class="window" cx="71" cy="202" r="1.4" fill="#FF9AD5" style="--wd:.2s"/>
          <circle class="window" cx="63" cy="176" r="1.3" fill="#8FE3FF" style="--wd:.9s"/>
          <circle class="window" cx="63" cy="192" r="1.3" fill="#FFE9A8" style="--wd:1.6s"/>
          <circle class="window" cx="63" cy="204" r="1.3" fill="#FF9AD5" style="--wd:.4s"/>
          <circle class="window" cx="113" cy="182" r="1.4" fill="#8FE3FF" style="--wd:.7s"/>
          <circle class="window" cx="113" cy="198" r="1.4" fill="#FFE9A8" style="--wd:1.2s"/>
          <circle class="window" cx="131" cy="160" r="1.4" fill="#FF9AD5" style="--wd:.5s"/>
          <circle class="window" cx="131" cy="176" r="1.4" fill="#8FE3FF" style="--wd:1.0s"/>
          <circle class="window" cx="131" cy="196" r="1.4" fill="#FFE9A8" style="--wd:1.5s"/>
        </g>
      </svg>

      <!-- The actual logo raster asset — crossfades in over the drawn shapes -->
      <img class="logo-img" src="uw_msa_logo.jpg" alt="MSA at UW logo" />
    </div>

    <!-- 2C: wordmark, letter-by-letter stagger (kept separate from the image) -->
    <div class="wordmark">
      <span class="word-msa" data-split="MSA"></span>
      <span class="word-atuw" data-split="AT UW"></span>
    </div>

    <!-- Step 4: headline / subtitle / CTAs -->
    <h1 class="headline" data-split-words="Connection. Community. Faith."></h1>
    <p class="subtitle">The Muslim Students Association at the University of Washington.</p>
    <div class="cta-row">
      <a href="#" class="btn btn-primary">Get Involved</a>
      <a href="#" class="btn btn-secondary">Learn More</a>
    </div>

  </div>

<script type="module">
  import { animate, createTimeline, stagger, utils } from "https://cdn.jsdelivr.net/npm/animejs@4/+esm";

  /* ============================================================
     SPEED CONTROLS — durations in ms. Colors live in the :root
     CSS block at the top of the file.
     ============================================================ */
  const DUR = {
    accents: 500,
    crescent: 950,
    skyline: 650,
    logoImg: 600,
    wordmarkLetter: 420,
    headlineWord: 520,
    subtitle: 500,
    cta: 500,
  };

  // ---- split "MSA" / "AT UW" into per-letter spans -----------------
  document.querySelectorAll("[data-split]").forEach((el) => {
    const text = el.dataset.split;
    el.innerHTML = text.split("").map((ch) =>
      `<span class="letter">${ch === " " ? "&nbsp;" : ch}</span>`
    ).join("");
  });

  // ---- split the headline into per-word spans -----------------------
  document.querySelectorAll("[data-split-words]").forEach((el) => {
    const text = el.dataset.splitWords;
    el.innerHTML = text.split(" ").map((w) => `<span class="word">${w}</span>`).join(" ");
  });

  // ---- prep the crescent path for a stroke self-draw ------------------
  const crescentPath = document.getElementById("crescentPath");
  const crescentLen = crescentPath.getTotalLength();
  utils.set(crescentPath, { strokeDasharray: crescentLen, strokeDashoffset: crescentLen });

  // ============================================================
  //  MAIN REVEAL TIMELINE
  // ============================================================
  const tl = createTimeline({ defaults: { ease: "outExpo" } });

  // Step 1 — accent shapes fade/scale in
  tl.add(".accent", {
    opacity: [0, 0.6],
    scale: [0.8, 1],
    duration: DUR.accents,
  }, 0);

  // Step 2A — crescent draws itself in (stroke dash reveal)
  tl.add(crescentPath, {
    strokeDashoffset: [crescentLen, 0],
    duration: DUR.crescent,
    ease: "inOutSine",
  }, 150);

  // Faint filled moon body fades in alongside the outline draw, so the
  // buildings have something to visually sit "inside"
  tl.add(".moon-fill-svg", {
    opacity: [0, 1],
    duration: DUR.crescent,
  }, 150);

  // Step 2B — skyline rises from the moon's base, fading in
  tl.add(".skyline-rise", {
    translateY: [40, 0],
    opacity: [0, 1],
    duration: DUR.skyline,
    ease: "outQuad",
  }, "-=450");

  // Logo image crossfades over the drawn shapes
  tl.add(".logo-img", {
    opacity: [0, 1],
    scale: [0.85, 1],
    duration: DUR.logoImg,
  }, "-=250");

  // Step 2C — wordmark letters stagger in
  tl.add(".wordmark .letter", {
    opacity: [0, 1],
    translateY: [16, 0],
    duration: DUR.wordmarkLetter,
    delay: stagger(35),
  }, "-=200");

  // Step 4 — headline words rise/fade sequentially
  tl.add(".headline .word", {
    opacity: [0, 1],
    translateY: [22, 0],
    duration: DUR.headlineWord,
    delay: stagger(90),
  }, "-=100");

  // Subtitle fades in
  tl.add(".subtitle", {
    opacity: [0, 1],
    translateY: [12, 0],
    duration: DUR.subtitle,
  }, "-=200");

  // CTA buttons slide up into place
  tl.add(".btn", {
    opacity: [0, 1],
    translateY: [24, 0],
    duration: DUR.cta,
    delay: stagger(90),
  }, "-=250");

  // ============================================================
  //  STEP 3 — interactive ripple grid, independent of the timeline
  //  Rings alternate PURPLE, GOLD, PURPLE, GOLD... outward from the
  //  cursor. Colors read from --purple / --gold in :root above.
  //  RING_SPACING controls how wide each colored band is.
  // ============================================================
  const canvas = document.getElementById("grid-canvas");
  const ctx = canvas.getContext("2d");
  const SPACING = 26;         // distance between grid dots, px
  const DOT_SIZE = 2;         // base square size, px
  const RIPPLE_RADIUS = 320;  // how far the ripple is allowed to travel
  const RING_SPACING = 34;    // width of each alternating color band, px
  const RING_TRAIL = 3;       // how many rings stay lit behind the wavefront
  const WAVE_SPEED = 4;       // px/frame the wavefront expands

  const rootStyles = getComputedStyle(document.documentElement);
  const DOT_COLOR = rootStyles.getPropertyValue("--grid-dot").trim();
  const RING_COLORS = [
    rootStyles.getPropertyValue("--purple").trim(), // ring 0 (closest), 2, 4...
    rootStyles.getPropertyValue("--gold").trim(),    // ring 1, 3, 5...
  ];

  let w, h, cols, rows;
  let mouse = { x: -9999, y: -9999, t: 0 };
  let clock = 0;

  function resize() {
    w = canvas.width = window.innerWidth;
    h = canvas.height = window.innerHeight;
    cols = Math.ceil(w / SPACING);
    rows = Math.ceil(h / SPACING);
  }
  window.addEventListener("resize", resize);
  resize();

  window.addEventListener("mousemove", (e) => {
    mouse.x = e.clientX;
    mouse.y = e.clientY;
    mouse.t = clock; // timestamp of most recent movement, for ripple decay
  });

  function draw() {
    clock += 1;
    ctx.clearRect(0, 0, w, h);

    const age = clock - mouse.t;                 // frames since last mouse move
    const wavefront = age * WAVE_SPEED;           // how far the ripple has traveled
    const rippleAlive = age < 110 && wavefront < RIPPLE_RADIUS;

    for (let cy = 0; cy <= rows; cy++) {
      for (let cx = 0; cx <= cols; cx++) {
        const x = cx * SPACING;
        const y = cy * SPACING;
        let size = DOT_SIZE;
        let color = DOT_COLOR;
        ctx.globalAlpha = 0.5;

        if (rippleAlive) {
          const dx = x - mouse.x, dy = y - mouse.y;
          const dist = Math.sqrt(dx * dx + dy * dy);

          // Is this dot within the trailing band behind the expanding wavefront?
          const behindFront = wavefront - dist;
          if (behindFront >= 0 && behindFront < RING_SPACING * RING_TRAIL) {
            const ringIndex = Math.floor(dist / RING_SPACING);
            color = RING_COLORS[ringIndex % 2];
            // brightest right at the wavefront, fading out toward the trail's end
            const bandFade = 1 - behindFront / (RING_SPACING * RING_TRAIL);
            const overallFade = Math.max(0, 1 - age / 110);
            const boost = bandFade * overallFade;
            size = DOT_SIZE + boost * 3;
            ctx.globalAlpha = Math.min(1, 0.3 + boost * 0.9);
          }
        }

        ctx.fillStyle = color;
        ctx.fillRect(x - size / 2, y - size / 2, size, size);
        ctx.globalAlpha = 1;
      }
    }
    requestAnimationFrame(draw);
  }
  draw();
</script>
</body>
</html>
